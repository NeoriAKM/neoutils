<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NeoUtils -> install</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <button class="main-button" onclick="location.href = 'index.html'"><img src="img/home.png" alt="Домой" class="icon"></button>
            <button onclick="location.href = 'install.html'">Скачать</button>
            <button onclick="location.href = 'news.html'">Новости</button>
        </header>
        <h1>NeoUtils --> Install</h1>

        <h3>
            На этой странице вы можете скачать бинарные файлы. Но если вам интересно,
            то в конце сайта есть ссылки на установку исходного кода
            <hr>
            Ниже представлены файлы, которые вы можете установить
        </h3>
        <br>

        <div class="install-section">
            <h2 class="section-text">Исполняемые файлы</h2>
            <button class="install-button" onclick="window.location.href='files/lsdr'">lsdr</button>
            <button class="install-button" onclick="window.location.href='files/dog'">dog</button>
            <button class="install-button" onclick="window.location.href='files/echo'">echo</button>
            <button class="install-button" onclick="window.location.href='files/clear'">clear</button>
            <button class="install-button" onclick="window.location.href='files/whereami'">whereami</button>
        </div>

        <div class="install-section">
            <h2 class="section-text">Исходный код</h2>
            <button class="install-button" onclick="window.location.href='src/lsdr.c'">Исходники lsdr</button>
            <button class="install-button" onclick="window.location.href='src/dog.c'">Исходники dog</button>
            <button class="install-button" onclick="window.location.href='src/echo.c'">Исходники echo</button>
            <button class="install-button" onclick="window.location.href='src/clear.c'">Исходники clear</button>
            <button class="install-button" onclick="window.location.href='src/whereami.c'">Исходники whereami</button>
        </div>

        <div class="install-section">
            <h2 class="section-text">статичные (работают без glibc)</h2>
            <button class="install-button" onclick="window.location.href='static/lsdr.c'">статичный lsdr</button>
            <button class="install-button" onclick="window.location.href='static/dog.c'">статичный dog</button>
            <button class="install-button" onclick="window.location.href='static/echo.c'">статичный echo</button>
            <button class="install-button" onclick="window.location.href='static/clear.c'">статичный clear</button>
            <button class="install-button" onclick="window.location.href='static/whereami.c'">статичный whereami</button>
        </div>
        
        <div class="install-section">
            <h2 class="section-text">zip архив всех утилит</h2>
            <button class="install-button" onclick="window.location.href='files/all.zip'">исполняемые</button>
            <button class="install-button" onclick="window.location.href='static/all.zip'">статичные исполняемые</button>
            <button class="install-button" onclick="window.location.href='src/all.zip'">исходники</button>
        </div>
    </body>
</html>
